<!DOCTYPE html>
<html lang="en-US">

<head>
    <title>SignUp</title>
    <link rel="stylesheet" href="../Design/Style.css">
</head>

<body>
    <div class="container">

        <h1>User Registration Form</h1>

        <fieldset>
            <legend>User Personal Information</legend>

            <form>
                <table>
                    <tr>
                        <td><label for="name">Name:</label></td>
                        <td><input type="text" id="name" name="name" placeholder="Enter Your Name"></td>
                    </tr>

                    <tr>
                        <td><label for="DOB">Date Of Birth:</label></td>
                        <td><input type="date" id="DOB" name="DOB"></td>
                    </tr>

                    <tr>
                        <td><label for="Phone">Phone:</label></td>
                        <td><input type="text" id="Phone" name="Phone" placeholder="Enter Your Number"></td>
                    </tr>

                    <tr>
                        <td><label for="Email">Email:</label></td>
                        <td><input type="email" id="Email" name="Email" placeholder="Enter Your Email"></td>
                    </tr>

                    <tr>
                        <td><label for="File">National ID:</label></td>
                        <td><input type="file" id="File" name="File"></td>
                    </tr>

                    <tr>
                        <td><label for="Citizenship">Choose Citizenship:</label></td>
                        <td>
                            <select id="Citizenship" name="Citizenship">
                                <option>Select Country</option>
                                <option>Bangladesh</option>
                                <option>USA</option>
                                <option>Argentina</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td>User Profession:</td>
                        <td>
                            <input type="checkbox" id="student" name="Profession">
                            <label for="student">Student</label>
                            <br>

                            <input type="checkbox" id="Faculty" name="Profession">
                            <label for="Faculty">Faculty</label>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="Address">Address:</label></td>
                        <td>
                            <textarea id="Address" name="Address" rows="10" cols="25" style="resize: none;"></textarea>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="username">Username:</label></td>
                        <td><input type="text" id="username" name="username" placeholder="Enter Your Username"></td>
                    </tr>

                    <tr>
                        <td><label for="password">Password:</label></td>
                        <td><input type="password" id="password" name="password" placeholder="Enter Your Password"></td>
                    </tr>

                    <tr>
                        <td colspan="2">
                            <input type="checkbox" id="condition" name="condition">
                            <label for="condition">
                                <font color="red">I HAVE AGREED TO THE TERMS AND CONDITION.</font>
                            </label>
                        </td>
                    </tr>
                </table>

                <input type="submit" id="submit" name="submit" value="SignUp">
                <input type="reset" id="reset" name="reset" value="Reset">
            </form>
        </fieldset>

    </div>
</body>

</html>
